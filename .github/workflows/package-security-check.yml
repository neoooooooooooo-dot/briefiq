name: Package Security Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: security
    runs-on: ["self-hosted", "linux", "superoptimizers", "security"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Audit package dependencies
        run: |
          echo "Running bun audit --audit-level=high..."
          bun audit --audit-level=high
