name: Prod DB Migration

on:
  push:
    branches:
      - prod
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ["self-hosted", "linux", "superoptimizers", "prod-db-migration"]
    permissions:
      id-token: write
    steps:
      - name: Request OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.superoptimizers.cofounder.co" | jq -r '.value')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Run migrations
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          response_file=$(mktemp)
          status_code=$(curl -sS -o "$response_file" -w "%{http_code}" -X POST \
            https://api.superoptimizers.cofounder.co/migrations/v1/run \
            -H "Authorization: Bearer $OIDC_TOKEN")
          if [ "$status_code" -ge 400 ]; then
            echo "Migration API failed with status $status_code"
            cat "$response_file"
            rm -f "$response_file"
            exit 1
          fi
          cat "$response_file"
          rm -f "$response_file"
