name: Frontend Tests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  frontend-tests:
    name: frontend-tests
    runs-on: ["self-hosted", "linux", "superoptimizers", "frontend-tests"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome check
        run: bunx --no-install biome check . --files-ignore-unknown=true

      - name: Run tests (if configured)
        run: |
          if bun -e 'const pkg = JSON.parse(await Bun.file("package.json").text()); process.exit(pkg.scripts?.test ? 0 : 1);'; then
            bun run test
          else
            echo "No test script in package.json, skipping"
          fi
